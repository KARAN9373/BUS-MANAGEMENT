<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Bus Reservation System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('{{ url_for('static', filename='dashboard_bg.jpg') }}') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-in-out;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffeb3b;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        a.button {
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            background-color: #1976d2;
            color: white;
            transition: transform 0.3s, background-color 0.3s;
        }

        a.button:hover {
            background-color: #0d47a1;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Dashboard</h1>
        <div class="button-container">
            <a href="{{ url_for('select_route') }}" class="button">Select Route</a>
            <a href="{{ url_for('view_bookings') }}" class="button">View Bookings</a>
            <a href="{{ url_for('cancel_ticket') }}" class="button">Cancel Ticket</a>
            <a href="{{ url_for('login') }}" class="button">Logout</a>
        </div>
    </div>
</body>
</html>
